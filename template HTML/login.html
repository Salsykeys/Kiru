<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kiri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiru - Login</title>
    <!-- CSS files -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .rounded {
        border-radius: 1rem !important;
      }
    </style>
  </head>
  <body class="d-flex flex-column">
    <div class="page page-center">
      <div class="container container-tight py-4">
        <div class="text-center mb-4 mt-5">
            <a href="/" class="navbar-brand navbar-brand-autodark p-4 bg-blue-lt rounded-circle shadow-sm">
                <img src="../frontend-pos/public/images/logo.png" height="60" alt="" />
            </a>
            <br />
            <h2 class="mt-3">LOGIN KASIR</h2>
        </div>
        <div class="card card-md rounded">
            <div class="card-body">
                <h2 class="h2 text-center mb-4">Masuk ke Dashboard</h2>
                <form action="#" autocomplete="off" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" placeholder="your@email.com" autocomplete="off" />
                    </div>
                    <div class="mb-2">
                        <label class="form-label">
                            Password
                        </label>
                        <input type="password" class="form-control" placeholder="Your password" autocomplete="off" />
                    </div>
                    <div class="mb-2">
                        <label class="form-check">
                            <input type="checkbox" class="form-check-input" />
                            <span class="form-check-label">Remember me on this device</span>
                        </label>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary w-100 rounded">Sign in</button>
                    </div>
                </form>
                <hr class="my-3" />
                <div class="text-center">
                    <a href="#" class="text-secondary small">Masuk sebagai Customer</a>
                </div>
            </div>
        </div>
      </div>
    </div>
    <!-- Tabler Core -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
