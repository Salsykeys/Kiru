<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kiri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiru - Dashboard</title>
    <!-- CSS files -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .scrollable-card-body {
        max-height: 400px;
        overflow-y: auto;
      }
      .scrollable-card-body::-webkit-scrollbar {
        width: 6px;
      }
      .scrollable-card-body::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .scrollable-card-body::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      .rounded { border-radius: 1rem !important; }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- HEADER STARTS -->
      <div class="sticky-top">
          <header class="navbar navbar-expand-md d-print-none sticky-top" >
              <div class="container-xl">
                  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
                      <span class="navbar-toggler-icon"></span>
                  </button>
                  <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3 mt-1">
                      <a href="dashboard.html">
                          <img src="../frontend-pos/public/images/logo-kirudoang.png" width="100" height="32" alt="Kiru" class="navbar-brand-image mb-2" />
                          <label class='ms-2'>Kiru</label>
                      </a>
                  </h1>
                  <div class="navbar-nav flex-row order-md-last">
                      <div class="nav-item dropdown">
                          <a href="#" class="nav-link d-flex lh-1 text-reset p-0" data-bs-toggle="dropdown">
                              <span class="avatar avatar-sm" style="background-image: url(../frontend-pos/public/images/boy.png)"></span>
                              <div class="d-none d-xl-block ps-2">
                                  <div>Admin</div>
                                  <div class="mt-1 small text-muted">admin@gmail.com</div>
                              </div>
                          </a>
                          <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow rounded mt-3">
                              <a href="#" class="dropdown-item">Profile</a>
                              <div class="dropdown-divider"></div>
                              <a href="login.html" class="dropdown-item">Logout</a>
                          </div>
                      </div>
                  </div>
              </div>
          </header>

          <header class="navbar-expand-md">
              <div class="collapse navbar-collapse" id="navbar-menu">
                  <div class="navbar bg-muted-lt">
                      <div class="container-xl">
                          <ul class="navbar-nav">
                              <li class="nav-item active">
                                  <a class='nav-link' href="dashboard.html">
                                      <span class="nav-link-icon d-md-none d-lg-inline-block">
                                          <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 12l-2 0l9 -9l9 9l-2 0" /><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" /><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" /></svg>
                                      </span>
                                      <span class="nav-link-title">HOME</span>
                                  </a>
                              </li>
                              <li class="nav-item">
                                <a class='nav-link' href="categories.html">
                                    <span class="nav-link-title">CATEGORIES</span>
                                </a>
                              </li>
                          </ul>
                      </div>
                  </div>
              </div>
          </header>
      </div>
      <!-- HEADER ENDS -->
      
      <div class="page-wrapper">
        <div class="page-header d-print-none">
            <div class="container-xl">
                <div class="row g-2 align-items-center">
                    <div class="col">
                        <div class="page-pretitle">HALAMAN</div>
                        <h2 class="page-title">DASHBOARD</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="container-xl">
                <div class="row row-deck row-cards">
                    <div class="col-sm-6 col-lg-3">
                        <div class="card rounded card-link card-link-pop">
                            <div class="card-body">
                                <div class="subheader">Sales Today</div>
                                <div class="h1 mb-2">10</div>
                                <hr class='mb-2 mt-1' />
                                <div class="h1 mb-0 me-2">Rp 500.000</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-lg-3">
                        <div class="card rounded card-link card-link-pop">
                            <div class="card-body">
                                <div class="subheader">Profits Today</div>
                                <div class="h1 mb-0 me-2 mt-4">Rp 150.000</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class='row mt-5'>
                    <div class="col-md-8">
                        <div class='card rounded'>
                            <div class='card-header p-3'>
                                <h3 class='mb-0'>PRODUCTS BEST SELLING</h3>
                            </div>
                            <div class="card-body">
                                <!-- Dummy chart placeholder -->
                                <div style="height: 350px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; color: #aaa;">Chart Placeholder</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class='card rounded'>
                            <div class='card-header p-3'>
                                <h3 class='mb-0'>PRODUCTS LIMIT STOCK</h3>
                            </div>
                            <div class="card-body scrollable-card-body">
                                <!-- Dummy Product -->
                                <div class='col-12 mb-2'>
                                    <div class="card rounded">
                                        <div class="card-body d-flex align-items-center">
                                            <div style="background: #e9ecef; width: 50px; height: 50px; border-radius: 4px;" class="me-3"></div>
                                            <div class="flex-fill">
                                                <h4 class="mb-0">Kopi Susu</h4>
                                                <hr class="mb-1 mt-1" />
                                                <p class="text-danger mb-0">Stock: 2</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>
    <!-- Tabler Core -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
